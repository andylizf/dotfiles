ssh:
  # Paste your private key here (multi-line PEM). Then encrypt with sops.
  id_ed25519: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    (your private key here)
    -----END OPENSSH PRIVATE KEY-----

tokens:
  # Optional: Claude/OpenAI/Gemini tokens
  claude: YOUR_CLAUDE_TOKEN
  openai: YOUR_OPENAI_TOKEN
  gemini: YOUR_GEMINI_API_KEY

lambda:
  # Multiple Lambda Labs Cloud API keys (profile-based)
  # 'default' becomes LAMBDA_API_KEY, others become LAMBDA_API_KEY_<NAME>
  default: YOUR_DEFAULT_LAMBDA_KEY
  work: YOUR_WORK_LAMBDA_KEY

cloudflare:
  # Cloudflare Access service token (Zero Trust)
  client_id: YOUR_CF_ACCESS_CLIENT_ID.access
  client_secret: YOUR_CF_ACCESS_CLIENT_SECRET
  # Scoped API token (wrangler, terraform, CLI)
  api_token: YOUR_CLOUDFLARE_API_TOKEN

docker:
  # Optional: Docker registry credentials (stored as ~/.docker/config.json)
  config.json: |
    {
      "auths": {
        "registry.example.com": {
          "auth": "BASE64_ENCODED_USERNAME_COLON_PASSWORD"
        }
      }
    }
